<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimRadio | Simulador</title>

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/config.css">

    <script src="js/load_header.js"></script>
    <script src="js/config.js" defer></script>
</head>

<body>
    <div id="header-container"></div>

    <main>
        <h2>Configuración del transceptor</h2>
        <section>
            <div>
                <label for="sensibility-input">Sensibilidad <span class="actual-value" id="sensibility-currentValue">(-102 dBm)</span></label>
                <input id="sensibility-input" type="number" value="-102">
            </div>

            <div>
                <label for="histeresis-input">Histéresis SQ <span class="actual-value" id="histeresis-currentValue">(13 dBm)</span></label>
                <input id="histeresis-input" type="number" min="0" value="13">
            </div>

            <div class="controls">
                <button id="config__reset-btn">Reset</button>
                <button id="config__apply-btn">Aplicar</button>
            </div>
        </section>
    </main>
</body>

</html>
